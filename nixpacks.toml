# Nixpacks build config — Python + Node monorepo for Railway.
# npm is bundled with nodejs — do not add nodePackages.npm separately.

[phases.setup]
nixPkgs = ["python311", "nodejs"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
