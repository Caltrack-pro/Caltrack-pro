# Nixpacks build config — Python + Node monorepo for Railway.
# Uses a venv to get a self-contained pip, avoiding Nix pip availability issues.

[phases.setup]
nixPkgs = ["python311", "nodejs"]

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install -r backend/requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && /app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
